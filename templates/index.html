<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Soundtrack Finder</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input[type="text"] { width: 90%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 16px; }
        button { background: #00adb5; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #007a80; }
        .result { margin-top: 30px; padding: 20px; background: #252525; border-radius: 5px; text-align: left; white-space: pre-line; line-height: 1.6; }
        .result a { color: #ff0000; text-decoration: none; font-weight: bold; }
        .result a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎵 Find Movie Soundtracks with AI</h2>
    <p>Describe the movie and the scene where the song plays:</p>
    
    <form method="POST">
        <input type="text" name="user_request" placeholder="e.g., Interstellar, dock scene with the giant wave" required>
        <br>
        <button type="submit">Search Track</button>
    </form>

    {% if result %}
    <div class="result">
        <strong style="color: #00adb5; font-size: 18px;">AI Suggestions:</strong>
        <p>{{ result | safe }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
